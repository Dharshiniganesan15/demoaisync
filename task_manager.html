<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Simple Task Manager</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f6f8;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    padding:25px;
    width:400px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
}

.input-area{
    display:flex;
    gap:10px;
    margin-bottom:15px;
}

input{
    flex:1;
    padding:8px;
}

button{
    padding:8px 12px;
    border:none;
    background:#007bff;
    color:white;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

ul{
    list-style:none;
    padding:0;
}

li{
    background:#f1f1f1;
    margin-bottom:8px;
    padding:8px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-radius:5px;
}

.completed{
    text-decoration:line-through;
    color:gray;
}

.delete{
    background:red;
}
</style>
</head>

<body>

<div class="container">

<h2>Task Manager</h2>

<div class="input-area">
<input type="text" id="taskInput" placeholder="Enter new task">
<button onclick="addTask()">Add</button>
</div>

<ul id="taskList"></ul>

</div>

<script>

function addTask(){

    const input = document.getElementById("taskInput");
    const taskText = input.value.trim();

    if(taskText === ""){
        alert("Please enter a task");
        return;
    }

    const li = document.createElement("li");

    const span = document.createElement("span");
    span.textContent = taskText;

    span.onclick = function(){
        span.classList.toggle("completed");
    }

    const delBtn = document.createElement("button");
    delBtn.textContent = "Delete";
    delBtn.className = "delete";

    delBtn.onclick = function(){
        li.remove();
    }

    li.appendChild(span);
    li.appendChild(delBtn);

    document.getElementById("taskList").appendChild(li);

    input.value="";
}

</script>

</body>
</html>
