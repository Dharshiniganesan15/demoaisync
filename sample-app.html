<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Demo AI Sync - Sample App</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #2563eb;
      --success: #16a34a;
      --danger: #dc2626;
      --border: #dbe3ee;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(180deg, #eef4ff 0%, var(--bg) 100%);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
    }
    .app {
      width: min(980px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      overflow: hidden;
    }
    header {
      background: #0f172a;
      color: #fff;
      padding: 18px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 {
      margin: 0;
      font-size: 1.1rem;
    }
    header span {
      font-size: 0.85rem;
      color: #cbd5e1;
    }
    .content {
      padding: 18px;
      display: grid;
      gap: 14px;
    }
    .row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
    }
    input, select, button {
      font: inherit;
      border-radius: 8px;
      border: 1px solid var(--border);
      padding: 10px 12px;
    }
    input:focus, select:focus {
      outline: 2px solid #bfdbfe;
      border-color: #93c5fd;
    }
    button {
      cursor: pointer;
      border: 0;
      background: var(--primary);
      color: #fff;
      font-weight: 600;
    }
    .button-clear {
      background: #334155;
    }
    ul {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 10px;
    }
    li {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      background: #fff;
    }
    .meta {
      color: var(--muted);
      font-size: 0.85rem;
      margin-top: 3px;
    }
    .badge {
      display: inline-block;
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 12px;
      font-weight: 700;
      margin-right: 6px;
    }
    .priority-high {
      background: #fee2e2;
      color: #991b1b;
    }
    .priority-medium {
      background: #fef3c7;
      color: #92400e;
    }
    .priority-low {
      background: #dcfce7;
      color: #166534;
    }
    .overdue {
      color: #dc2626;
      font-weight: 700;
    }
    .controls {
      display: flex;
      gap: 6px;
    }
    .done {
      text-decoration: line-through;
      color: #64748b;
    }
    .btn-success { background: var(--success); }
    .btn-danger { background: var(--danger); }
    .empty {
      padding: 20px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed var(--border);
      border-radius: 10px;
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <h1>Demo AI Sync - Task Board</h1>
      <span id="clock"></span>
    </header>

    <section class="content">
      <div class="row" style="grid-template-columns: 1fr 130px 130px auto;">
        <input id="taskInput" type="text" placeholder="Enter task..." />
        <select id="prioritySelect">
          <option value="high">High</option>
          <option value="medium" selected>Medium</option>
          <option value="low">Low</option>
        </select>
        <input id="dueDateInput" type="date" />
        <button id="addBtn">Add Task</button>
      </div>

      <div class="row" style="grid-template-columns: 160px 160px 1fr auto;">
        <select id="filterSelect">
          <option value="all">All</option>
          <option value="active">Active</option>
          <option value="done">Done</option>
        </select>
        <select id="sortSelect">
          <option value="newest">Sort: Newest</option>
          <option value="oldest">Sort: Oldest</option>
          <option value="priority">Sort: Priority</option>
          <option value="due">Sort: Due Date</option>
        </select>
        <input id="searchInput" type="text" placeholder="Search tasks..." />
        <button id="clearCompletedBtn" class="button-clear">Clear Completed</button>
      </div>

      <div class="row" style="grid-template-columns: 1fr;">
        <div class="meta" id="summary">0 tasks</div>
      </div>
      <div class="row" style="grid-template-columns: repeat(4, auto); justify-content: start;">
        <button id="markAllDoneBtn" class="button-clear">Mark All Done</button>
        <button id="markAllActiveBtn" class="button-clear">Mark All Active</button>
        <button id="exportBtn" class="button-clear">Export JSON</button>
        <button id="importBtn" class="button-clear">Import JSON</button>
      </div>

      <ul id="taskList"></ul>
      <div id="emptyState" class="empty">No tasks yet. Add your first task.</div>
      <input id="importFileInput" type="file" accept="application/json" style="display:none;" />
    </section>
  </main>

  <script>
    const taskInput = document.getElementById("taskInput");
    const prioritySelect = document.getElementById("prioritySelect");
    const dueDateInput = document.getElementById("dueDateInput");
    const addBtn = document.getElementById("addBtn");
    const taskList = document.getElementById("taskList");
    const filterSelect = document.getElementById("filterSelect");
    const sortSelect = document.getElementById("sortSelect");
    const searchInput = document.getElementById("searchInput");
    const clearCompletedBtn = document.getElementById("clearCompletedBtn");
    const markAllDoneBtn = document.getElementById("markAllDoneBtn");
    const markAllActiveBtn = document.getElementById("markAllActiveBtn");
    const exportBtn = document.getElementById("exportBtn");
    const importBtn = document.getElementById("importBtn");
    const importFileInput = document.getElementById("importFileInput");
    const summary = document.getElementById("summary");
    const emptyState = document.getElementById("emptyState");
    const clock = document.getElementById("clock");

    const STORAGE_KEY = "demoaisync_task_manager_v2";
    const tasks = [];

    function formatDateTime(d = new Date()) {
      return d.toLocaleString();
    }

    function renderClock() {
      clock.textContent = formatDateTime();
    }

    function createTask(text, priority, dueDate) {
      return {
        id: crypto.randomUUID(),
        text: text.trim(),
        priority: priority || "medium",
        dueDate: dueDate || "",
        done: false,
        createdAt: new Date().toISOString(),
      };
    }

    function saveTasks() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
    }

    function loadTasks() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return;
        const parsed = JSON.parse(raw);
        if (!Array.isArray(parsed)) return;
        const clean = parsed
          .filter((t) => t && typeof t.text === "string")
          .map((t) => ({
            id: t.id || crypto.randomUUID(),
            text: t.text.trim(),
            priority: t.priority || "medium",
            dueDate: t.dueDate || "",
            done: Boolean(t.done),
            createdAt: t.createdAt || new Date().toISOString(),
          }));
        tasks.splice(0, tasks.length, ...clean);
      } catch (_) {}
    }

    function addTask() {
      const text = taskInput.value.trim();
      if (!text) return;
      tasks.unshift(createTask(text, prioritySelect.value, dueDateInput.value));
      taskInput.value = "";
      prioritySelect.value = "medium";
      dueDateInput.value = "";
      saveTasks();
      render();
      taskInput.focus();
    }

    function toggleTask(id) {
      const item = tasks.find((t) => t.id === id);
      if (item) item.done = !item.done;
      saveTasks();
      render();
    }

    function editTask(id) {
      const task = tasks.find((t) => t.id === id);
      if (!task) return;
      const updatedText = window.prompt("Edit task", task.text);
      if (updatedText == null) return;
      const trimmed = updatedText.trim();
      if (!trimmed) return;
      task.text = trimmed;
      saveTasks();
      render();
    }

    function removeTask(id) {
      const index = tasks.findIndex((t) => t.id === id);
      if (index >= 0) tasks.splice(index, 1);
      saveTasks();
      render();
    }

    function clearCompletedTasks() {
      for (let i = tasks.length - 1; i >= 0; i -= 1) {
        if (tasks[i].done) tasks.splice(i, 1);
      }
      saveTasks();
      render();
    }

    function markAllDone() {
      tasks.forEach((t) => {
        t.done = true;
      });
      saveTasks();
      render();
    }

    function markAllActive() {
      tasks.forEach((t) => {
        t.done = false;
      });
      saveTasks();
      render();
    }

    function exportTasks() {
      const payload = {
        exportedAt: new Date().toISOString(),
        tasks,
      };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `tasks-${new Date().toISOString().replace(/[:.]/g, "-")}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function importTasksFromFile(file) {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const parsed = JSON.parse(String(reader.result || "{}"));
          const incoming = Array.isArray(parsed) ? parsed : parsed.tasks;
          if (!Array.isArray(incoming)) throw new Error("Invalid format");
          const clean = incoming
            .filter((t) => t && typeof t.text === "string")
            .map((t) => ({
              id: t.id || crypto.randomUUID(),
              text: t.text.trim(),
              priority: t.priority || "medium",
              dueDate: t.dueDate || "",
              done: Boolean(t.done),
              createdAt: t.createdAt || new Date().toISOString(),
            }));
          tasks.splice(0, tasks.length, ...clean);
          saveTasks();
          render();
        } catch (_) {
          window.alert("Invalid JSON file.");
        }
      };
      reader.readAsText(file);
    }

    function getFilteredTasks() {
      const status = filterSelect.value;
      const query = searchInput.value.trim().toLowerCase();

      const statusFiltered =
        status === "active"
          ? tasks.filter((t) => !t.done)
          : status === "done"
            ? tasks.filter((t) => t.done)
            : tasks;

      const textFiltered = !query
        ? statusFiltered
        : statusFiltered.filter((t) => t.text.toLowerCase().includes(query));

      const priorityRank = { high: 0, medium: 1, low: 2 };
      const sortBy = sortSelect.value;
      const sorted = [...textFiltered];

      if (sortBy === "oldest") {
        sorted.sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));
      } else if (sortBy === "priority") {
        sorted.sort((a, b) => (priorityRank[a.priority] ?? 9) - (priorityRank[b.priority] ?? 9));
      } else if (sortBy === "due") {
        sorted.sort((a, b) => {
          if (!a.dueDate && !b.dueDate) return 0;
          if (!a.dueDate) return 1;
          if (!b.dueDate) return -1;
          return new Date(a.dueDate) - new Date(b.dueDate);
        });
      } else {
        sorted.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
      }

      return sorted;
    }

    function render() {
      const rows = getFilteredTasks();
      taskList.innerHTML = "";

      rows.forEach((task) => {
        const dueLabel = task.dueDate
          ? `Due: ${new Date(task.dueDate).toLocaleDateString()}`
          : "Due: Not set";
        const overdue =
          Boolean(task.dueDate) &&
          !task.done &&
          new Date(task.dueDate).setHours(23, 59, 59, 999) < Date.now();

        const li = document.createElement("li");
        li.innerHTML = `
          <div>
            <div class="${task.done ? "done" : ""}">${task.text}</div>
            <div class="meta">
              <span class="badge priority-${task.priority || "medium"}">${(task.priority || "medium").toUpperCase()}</span>
              <span class="${overdue ? "overdue" : ""}">${dueLabel}</span>
            </div>
            <div class="meta">Created: ${new Date(task.createdAt).toLocaleString()}</div>
          </div>
          <div class="controls">
            <button class="btn-success">${task.done ? "Undo" : "Done"}</button>
            <button class="button-clear">Edit</button>
            <button class="btn-danger">Delete</button>
          </div>
        `;

        const [toggleBtn, editBtn, deleteBtn] = li.querySelectorAll("button");
        toggleBtn.addEventListener("click", () => toggleTask(task.id));
        editBtn.addEventListener("click", () => editTask(task.id));
        deleteBtn.addEventListener("click", () => removeTask(task.id));
        taskList.appendChild(li);
      });

      const doneCount = tasks.filter((t) => t.done).length;
      summary.textContent = `${tasks.length} tasks (${doneCount} done) | Showing ${rows.length}`;
      emptyState.style.display = rows.length ? "none" : "block";
      clearCompletedBtn.disabled = doneCount === 0;
      clearCompletedBtn.style.opacity = doneCount === 0 ? "0.6" : "1";
      clearCompletedBtn.style.cursor = doneCount === 0 ? "not-allowed" : "pointer";
      markAllDoneBtn.disabled = tasks.length === 0 || doneCount === tasks.length;
      markAllActiveBtn.disabled = doneCount === 0;
    }

    addBtn.addEventListener("click", addTask);
    taskInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") addTask();
    });
    filterSelect.addEventListener("change", render);
    sortSelect.addEventListener("change", render);
    searchInput.addEventListener("input", render);
    clearCompletedBtn.addEventListener("click", clearCompletedTasks);
    markAllDoneBtn.addEventListener("click", markAllDone);
    markAllActiveBtn.addEventListener("click", markAllActive);
    exportBtn.addEventListener("click", exportTasks);
    importBtn.addEventListener("click", () => importFileInput.click());
    importFileInput.addEventListener("change", (e) => {
      const file = e.target.files && e.target.files[0];
      importTasksFromFile(file);
      importFileInput.value = "";
    });

    loadTasks();
    setInterval(renderClock, 1000);
    renderClock();
    render();
  </script>
</body>
</html>
